### 重力波とは？ (ざっくり)

<div class="simple-box">

* 質量を持つ物体が**加速度運動**することで生じる、**時空 (重力場) の波**
  * 荷電粒子が加速すると**電磁波**が出るのと同じアナロジー
  * 電荷 → 質量、 電磁場 → 重力場
* 1916 年にアインシュタインが一般相対論で予言
* 2015 年に LIGO が初めて直接観測に成功 **(GW150914)**
  * 理論での予言から実証まで**約 100 年**！

</div>


---

### GW150914 とは？

<div class="simple-box">

* **2015 年 9 月 14 日**、米 LIGO が検出した
  人類**最初の重力波直接観測**イベント
* 由来: **連星ブラックホール (BH) 合体** (Binary Black Hole merger)
* 2 つの BH が 1 つに合体し、エネルギーを放出
  * 質量 36 M☉ + 29 M☉ → 最終 BH 62 M☉
  * **約 3 M☉ 分のエネルギーが重力波として宇宙に放出**
* 数値相対論シミュレーションは観測波形の解析に極めて重要な役割を果たした

</div>

  </tbody>
</table>

### なぜ数値相対論は難しいのか

<div class="simple-box">

* 解くべきは **アインシュタイン方程式**
  * 10 個の連立非線形偏微分方程式
* **特異点を含む BH** をどう数値的に避けるか
* **数値安定性**のための定式化が必要
* 2005 年に初めて BBH 合体の数値シミュレーションに成功
  * それまではインスパイラルからマージャーまで通して解ける現象が極めて限られていた

</div>

### 解像度を落とす判断

<div class="simple-box">

* 自宅環境: **16 コア / 93 GiB RAM**
* 公式の N=28 設定では **メモリは何とかなる**ものの、**リングダウン到達まで 16 日以上**かかる見込み
  → 連休中に終わる計算、という制約と要件を満たさない
* **解像度を N=16 に落として** 1.75 倍粗いグリッドで回す方針へ
  * 軌道数・波形の **定性的再現** を狙う
  * 検証は **Zenodo の N=28 reference データとの比較**で代替

</div>

### 本自由研究の位置付け

<div class="simple-box">

**学術的な新規性・意義は無い**

* 公式ギャラリー・LIGO 論文・後続の数値相対論論文で
  **やり尽くされている**
* 解像度 N=16 では LIGO 観測の精度比較に
  使えるレベルには**精度不足**
* プロはさらに先 — 例えば連星中性子星合体での重元素生成やニュートリノ放出など — を研究対象としている
  * マルチメッセンジャー天文学の発達

</div>
