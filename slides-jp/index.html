### 重力波とは？ (ざっくり)

<div class="simple-box">

* 質量を持つ物体が**加速度運動**することで生じる、**時空 (重力場) の波**
  * 荷電粒子が加速すると**電磁波**が出るのと同じアナロジー
  * 電荷 → 質量、 電磁場 → 重力場
* 1916 年にアインシュタインが一般相対論で予言
* 2015 年に LIGO が初めて直接観測に成功 **(GW150914)**
  * 理論での予言から実証まで**約 100 年**！

</div>


---

### GW150914 とは？

<div class="simple-box">

* **2015 年 9 月 14 日**、米 LIGO が検出した
  人類**最初の重力波直接観測**イベント
* 由来: **連星ブラックホール (BH) 合体** (Binary Black Hole merger)
* 2 つの BH が 1 つに合体し、エネルギーを放出
  * 質量 $ 36 M_{\odot} $ + $ 29 M_{\odot} $ → 最終 BH $ 62 M_{\odot} $
  * **約 3 $M_{\odot}$ 分のエネルギーが重力波として宇宙に放出**
* 数値相対論シミュレーションは観測波形の解析に極めて重要な役割を果たした

</div>

### なぜ数値相対論は難しいのか

<div class="simple-box">

* 解くべきは **アインシュタイン方程式**
  * 10 個の連立非線形偏微分方程式

* **数値安定性**のための定式化が必要
* 2005 年に初めて BBH 合体の数値シミュレーションに成功
  * それまではインスパイラルからマージャーまで通して解ける現象が極めて限られていた

### 解像度を落とす判断

<div class="simple-box">

## 実行結果
### 解像度を落としたら何が起きたか

---

### 困った: 起動直後にクラッシュ

<div class="simple-box">

* 公式パラメータをそのまま N=16 で動かすと、シミュレーション
  **開始直後に座標系のエラーで abort**してしまう

</div>

<div class="code-block">

```text
ABORT: Interpolate2/test.cc:77
  refinement level > 0 grid contains
  inter-patch boundary points
```

</div>

---

### 何が起きていたのか? (ざっくり)

<div class="simple-box">

GW150914 の計算では**ハイブリッドな座標系**を使う:

* **内側**: BH 周辺の時空が激しく変化する領域
* **外側**: 重力波が伝播する領域

さらに格子の細かさを場所によって変える **AMR (適応格子細分化)** を併用。

→ 細かい格子と粗い格子のあいだに**「バッファ領域」** が必要。
計算を滑らかにつなぐための補間バッファ。

</div>

---

### バッファは解像度に反比例する

<div class="results-box">

<table>
  <thead>
    <tr>
      <th></th>
      <th>空間刻み h₀</th>
      <th>バッファ厚 (物理単位)</th>
      <th>結果</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>N=28 (公式)</td>
      <td>1.224 M</td>
      <td>~6 M</td>
      <td>OK</td>
    </tr>
    <tr>
      <td><strong>N=16 (本研究)</strong></td>
      <td><strong>2.143 M</strong></td>
      <td><strong>~10.7 M (1.75 倍)</strong></td>
      <td>❌ crash</td>
    </tr>
  </tbody>
</table>

</div>

<br>

<div class="highlight-box">

粗い解像度では**バッファが内側パッチと外側パッチの継ぎ目に侵入**し、
境界補間処理が破綻する。

</div>

---

### 解決策: 「内側」を拡大する

<div class="simple-box">

* バッファが届かないように、**内側パッチを物理的に拡大**する
  * **51.40 M → 77.10 M** (約 1.5 倍)
* AMR 階層を維持したまま **N=16 で安定動作**に成功

</div>

<br>

<div class="highlight-box">

* 教訓: パラメータは**特定の解像度に最適化**されている。
  解像度を変える際は単に格子数を変えるだけでは済まない
* 公式が「推奨値」を明記している意味を**身をもって理解**した

</div>

---

### 1700 M ぶっ通しは怖い

<div class="simple-box">

* 物理時間 **1700 M** (合体 + リングダウン完成まで) を一気に走らせると合計 80 時間以上
* 途中で異常があっても気付かず最後まで走らせると、**失敗箇所の特定が困難**で計算リソースの浪費が大きい

</div>

## リファレンスデータとの比較
### 自前 N=16 vs Zenodo N=28

---

### 比較戦略

<div class="simple-box">

* 公式 N=28 で実際に走らせた**生データが Zenodo に公開**されている
  * [10.5281/zenodo.155394](https://doi.org/10.5281/zenodo.155394)
* 自前 N=16 run vs Zenodo N=28 で比較:
  * **軌道**: BH の xy 平面軌道、軌道分離 D(t) の重ね描き
  * **重力波**: ψ4 振幅の時系列、ピーク値の数値比較
  * **最終 BH**: マージャー時刻、質量損失

</div>

---

### 連星 BH の軌道 (xy 平面)

<img src="assets/images/phase4/orbit_trajectory.png" height="375px">

<p class="caption">N=16 (本研究) と N=28 reference でほぼ重なる螺旋軌道。中心に向かって巻き込み、最後に合体</p>
<p class="caption">初期位置が違うのは出力結果の管理ミスです...</p>

---

### 軌道分離 D(t) — マージャーが遅れる

<img src="assets/images/phase4/orbit_separation.png" height="425px">

<p class="caption">N=16 ではマージャーまでの時間が <strong>+2.94% (≈ 26 M)</strong> 遅れる。</p>

---

### 軌道分離 D(t) — マージャー時刻で揃えるとほぼ重なる

<img src="assets/images/phase4/orbit_separation_aligned.png" height="480px">

<p class="caption">マージャー時刻で時間軸を整列。インスパイラル全域で N=16 / N=28 がほぼ重なる — <strong>遅れているだけで軌道の形そのものは正しく追えている</strong></p>

---

### 重力波 ψ4 実部 — 位相は少しずれるが形は再現

<img src="assets/images/phase4/psi4_22_re.png" height="480px">

<p class="caption">ψ4 の実部 (波そのもの)。マージャー直前で振幅が急激に増大。N=16 は <strong>位相が遅れ</strong>、合体直後の高周波部では振幅もやや劣化 — <strong>精度の劣化は確かに見える</strong>。それでも振動回数・包絡線の形は<strong>定性的に再現</strong>できている</p>

---

### 重力波 ψ4 振幅 — マージャー時刻で揃えるとピーク値が一致

<img src="assets/images/phase4/psi4_22_amplitude_aligned.png" height="480px">

<p class="caption">|ψ4| = √(Re² + Im²) のエンベロープ。マージャー時刻で時間軸を整列すると、N=16 / N=28 で<strong>ピーク振幅・時刻ともに高精度一致</strong> (振幅 −1.79%)</p>

---

### リングダウン波形 (拡大)

<img src="assets/images/phase4/ringdown_aligned.png" height="480px">

<p class="caption">合体後の最終 BH が<strong>特定周波数で振動しながら減衰</strong></p>

---

### 質量損失の計算

<div class="simple-box">

$$ \Delta M = M - 0.9518M = 0.0482 M \simeq 3.13 M_{\odot} $$

$M$: 初期状態での2つのBHの総質量

</div>

<br>

<div class="highlight-box">

* リファレンスの質量損失は約 $3.07 M_{\odot}$ 
* **「太陽質量の約3倍のエネルギーが重力波として宇宙に放出された」という有名な事実を数値シミュレーションで再現できた！**

</div>


---

### とくに驚いた結果

<div class="simple-box">

* インスパイラル期の軌道は極めて高い精度で再現できた
  * マージャー時刻が26M遅れるだけ 
* 重力波のピーク振幅は 1.79% しかずれない
  * 観測結果との定量的な検証には**明確に不足**だが、現象の定性的理解には十分
  * そもそも観測結果との定量的な検証は目的としていない
* 質量損失は $3.13 M_{\odot}$ で、LIGOの公式見解 $3.0 \pm 0.5 M_{\odot}$ の範囲内

</div>
